<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>higüeyshop | Panel Interno</title>
  <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body class="admin">
  <header class="market-header">
    <div class="topbar">
      <div class="brand">
        <img class="brand-logo" src="assets/img/logo-higuey.png" alt="Logo Higüey Shop">
      </div>
      <div class="actions-inline">
        <button id="adminLogoutBtn" class="btn secondary hidden" type="button">Cerrar sesión admin</button>
        <a class="btn-cliente" href="index.html">Ver tienda cliente</a>
      </div>
    </div>
  </header>

  <main class="container">
    <section id="adminLoginPanel" class="panel auth-panel">
      <div class="auth-head">
        <h2>Acceso rápido</h2>
      </div>
      <div class="actions-inline" style="margin:10px 0;">
        <button id="modoUserBtn" class="btn secondary" type="button">Usuario</button>
        <button id="modoAdminBtn" class="btn secondary" type="button">Admin</button>
      </div>

      <div id="userAccessBox" class="auth-grid">
        <form id="userRegisterForm" class="auth-form hidden">
          <strong>Crear cuenta usuario</strong>
          <input id="userRegisterNombre" type="text" placeholder="Nombre" required>
          <input id="userRegisterEmail" type="email" placeholder="Correo" required>
          <input id="userRegisterPassword" type="password" placeholder="Contraseña (min 6)" minlength="6" required>
          <button class="btn" type="submit">Registrarme</button>
          <p class="sub">¿Ya tienes usuario? <button id="userGoToLogin" class="link-btn" type="button">Iniciar sesión</button></p>
        </form>

        <form id="userLoginForm" class="auth-form">
          <strong>Iniciar sesión usuario</strong>
          <input id="userLoginEmail" type="email" placeholder="Correo" required>
          <input id="userLoginPassword" type="password" placeholder="Contraseña" required>
          <button class="btn" type="submit">Entrar a la tienda</button>
          <p class="sub">¿No tienes cuenta? <button id="userGoToRegister" class="link-btn" type="button">Crear cuenta</button></p>
        </form>
      </div>

      <div id="adminAccessBox" class="hidden">
        <form id="adminLoginForm" class="auth-form" style="max-width:460px;">
          <input id="adminEmail" type="email" placeholder="Correo admin" required>
          <input id="adminPassword" type="password" placeholder="Contraseña admin" required>
          <button class="btn" type="submit">Entrar al panel</button>
        </form>
      </div>
      <p id="adminAuthMsg" class="sub"></p>
    </section>

    <section id="adminApp" class="admin-shell hidden">
      <section class="panel">
        <h2 id="formTitulo">Agregar producto</h2>
        <p class="sub">Puedes subir imagenes desde tu carpeta y/o pegar URLs. Maximo 10 imagenes por articulo.</p>
        <div class="form-grid">
          <input id="nombre" type="text" placeholder="Nombre del articulo">
          <input id="categoria" type="text" placeholder="Categoria (Electronica, Hogar, Moda)">
          <input id="precio" type="number" min="0" step="1" placeholder="Precio actual (ej: 1850)">
          <input id="precioAnterior" type="number" min="0" step="1" placeholder="Precio anterior (ej: 2400)">
          <input id="rating" type="number" min="1" max="5" step="0.1" placeholder="Rating (1-5)">
          <input id="imagenesArchivos" type="file" accept="image/*" multiple>
          <textarea id="imagenesUrls" class="full" placeholder="URLs de imagen (una por linea)"></textarea>
          <textarea id="descripcion" class="full" placeholder="Descripcion corta del producto"></textarea>
          <button id="agregar" class="full">Agregar articulos de venta</button>
          <button id="cancelarEdicion" class="full btn secondary hidden" type="button">Cancelar edición</button>
        </div>
      </section>

      <section class="panel">
        <div class="list-header">
          <strong>Productos cargados</strong>
          <span class="count" id="conteo">0 productos</span>
        </div>
        <section id="productos" class="admin-list"></section>
      </section>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2" defer></script>
  <script src="assets/js/admin.js" defer></script>
</body>
</html>
